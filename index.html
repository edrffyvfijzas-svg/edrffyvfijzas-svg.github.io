<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynastica — Профессиональный Калькулятор Цен v3</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #2ecc71;
            --text-color: #ffffff;
            --text-muted: #95a5a6;
            --border-color: #333333;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            border: 1px solid var(--border-color);
        }
        h1 {
            text-align: center;
            color: var(--accent-color);
            margin-bottom: 5px;
            font-size: 24px;
        }
        .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: 600;
            color: #dddddd;
        }
        select, input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: #2b2b2b;
            color: #fff;
            box-sizing: border-box;
            font-size: 15px;
            transition: border-color 0.2s;
        }
        select:focus, input:focus {
            outline: none;
            border-color: var(--accent-color);
        }
        .result-box {
            margin-top: 25px;
            padding: 20px;
            background: #151515;
            border-left: 5px solid var(--accent-color);
            border-radius: 8px;
            text-align: center;
        }
        .result-title {
            font-size: 13px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .price {
            font-size: 46px;
            font-weight: bold;
            color: var(--accent-color);
            margin: 8px 0;
        }
        .hint {
            font-size: 13px;
            color: #7f8c8d;
            margin-top: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Dynastica Калькулятор Цен</h1>
    <div class="subtitle">Любой геном | Больше воскрешений — выше стоимость лота</div>
    
    <div class="form-group">
        <label for="dino-select">Выберите вид динозавра:</label>
        <select id="dino-select" onchange="calculatePrice()">
            <option value="Псиптакозавр">Пситтакозавр (1 DC)</option>
            <option value="Ородромус">Ородромус (2 DC)</option>
            <option value="Авацератопс">Авацератопс (4 DC)</option>
            <option value="Троодон">Троодон (5 DC)</option>
            <option value="Велоцирантор">Велоцираптор (6 DC)</option>
            <option value="Гипсилофон">Гипсилофодон (7 DC)</option>
            <option value="Дриозавр">Дриозавр (9 DC)</option>
            <option value="Австрорантор">Австрораптор (11 DC)</option>
            <option value="Герреразавр">Герреразавр (11 DC)</option>
            <option value="Галлиминус">Галлимим (11 DC)</option>
            <option value="Пахиринозавр">Пахиринозавр (11 DC)</option>
            <option value="Дилофозавр">Дилофозавр (12 DC)</option>
            <option value="Пахицефалозавр">Пахицефалозавр (12 DC)</option>
            <option value="Ютарантор">Ютараптор (13 DC)</option>
            <option value="Барионикс">Барионикс (16 DC)</option>
            <option value="Конкавенатор">Конкавенатор (16 DC)</option>
            <option value="Ирритантор">Ирритатор (16 DC)</option>
            <option value="Зупайзавр">Зупайзавр (16 DC)</option>
            <option value="Майзазавр">Майазавр (24 DC)</option>
            <option value="Лурдузавр">Лурдузавр (24 DC)</option>
            <option value="Паразауроф">Паразауролоф (26 DC)</option>
            <option value="Диаблоцератопс">Диаблоцератопс (27 DC)</option>
            <option value="Карнотавр">Карнотавр (27 DC)</option>
            <option value="Церратозавр">Цератозавр (30 DC)</option>
            <option value="Метрикантозавр">Метриакантозавр (31 DC)</option>
            <option value="Аллоазвр">Аллозавр (33 DC)</option>
            <option value="Ютираннус">Ютираннус (33 DC)</option>
            <option value="Трицератопс_33">Трицератопс младший (33 DC)</option>
            <option value="Заворофаганкас_33">Заурофаганакс младший (33 DC)</option>
            <option value="Зухомим">Зухомим (35 DC)</option>
            <option value="Стиракозавр">Стиракозавр (35 DC)</option>
            <option value="Гиганотовар_35">Гиганотозавр младший (35 DC)</option>
            <option value="Альбертозавр">Альбертозавр (38 DC)</option>
            <option value="Торвозазвр">Торвозавр (38 DC)</option>
            <option value="Уранозавр">Уранозавр (38 DC)</option>
            <option value="Тиранноозавр_38">Тираннозавр младший (38 DC)</option>
            <option value="Акрокантозавр">Акрокантозавр (41 DC)</option>
            <option value="Дасплетозавр">Дасплетозавр (44 DC)</option>
            <option value="Игуанодон">Игуанодон (44 DC)</option>
            <option value="Стегозавр">Стегозавр (49 DC)</option>
            <option value="Заворофаганкас">Заурофаганакс (49 DC)</option>
            <option value="Пуэрта">Пуэртазавр (55 DC)</option>
            <option value="Тираннозавр">Тираннозавр (55 DC)</option>
            <option value="Гиганотозавр">Гиганотозавр (55 DC)</option>
            <option value="Трицератопс">Трицератопс (55 DC)</option>
            <option value="Анкилозавр">Анкилозавр (55 DC)</option>
            <option value="Теризинозавр">Теризинозавр (55 DC)</option>
            <option value="Камаразавр">Камаразавр (57 DC)</option>
            <option value="Шантунгозавр">Шантунгозавр (60 DC)</option>
            <option value="Дейнохейрус">Дейнохейрус (63 DC)</option>
            <option value="Спинозавр">Спинозавр (68 DC)</option>
        </select>
    </div>

    <div class="form-group">
        <label for="oa-input">Очки активности (ОА):</label>
        <input type="number" id="oa-input" value="0" min="0" step="50" oninput="calculatePrice()">
    </div>

    <div class="form-group">
        <label for="revives-input">Количество воскрешений (Каждое добавляет +5% стоимости):</label>
        <input type="number" id="revives-input" value="0" min="0" max="500" oninput="calculatePrice()">
    </div>

    <div class="form-group">
        <label for="genome-input">Геном динозавра (Вручную: 1.0, 1.6, 2.5 и т.д.):</label>
        <input type="number" id="genome-input" value="1.0" min="0.1" step="0.1" oninput="calculatePrice()">
    </div>

    <div class="result-box">
        <div class="result-title">Рассчитанная стоимость лота</div>
        <div class="price"><span id="final-price">0</span> DC</div>
        <div class="hint" id="base-price-hint">Базовая цена вида: 0 DC</div>
    </div>
</div>

<script>
    const marketData = {
        "Гипсилофон": 7, "Авацератопс": 4, "Австрорантор": 11, "Герреразавр": 11,
        "Барионикс": 16, "Велоцирантор": 6, "Псиптакозавр": 1, "Ородромус": 2,
        "Троодон": 5, "Ютарантор": 13, "Дилофозавр": 12, "Галлиминус": 11,
        "Пахицефалозавр": 12, "Дриозавр": 9, "Конкавенатор": 16, "Ирритантор": 16,
        "Зупайзавр": 16, "Альбертозавр": 38, "Стегозавр": 49, "Акрокантозавр": 41,
        "Торвозазвр": 38, "Дасплетозавр": 44, "Пахиринозавр": 11, "Диаблоцератопс": 27,
        "Майзазавр": 24, "Паразауроф": 26, "Карнотавр": 27, "Церратозавр": 30,
        "Зухомим": 35, "Аллоазвр": 33, "Стиракозавр": 35, "Лурдузавр": 24,
        "Ютираннус": 33, "Игуанодон": 44, "Уранозавр": 38, "Метрикантозавр": 31,
        "Тиранноозавр_38": 38, "Гиганотовар_35": 35, "Трицератопс_33": 33, "Заворофаганкас_33": 33,
        "Спинозавр": 68, "Анкилозавр": 55, "Теризинозавр": 55, "Шантунгозавр": 60,
        "Камаразавр": 57, "Пуэрта": 55, "Дейнохейрус": 63, "Тираннозавр": 55,
        "Гиганотозавр": 55, "Трицератопс": 55, "Заворофаганкас": 49
    };

    function calculatePrice() {
        const dinoKey = document.getElementById('dino-select').value;
        const oa = parseFloat(document.getElementById('oa-input').value) || 0;
        const revives = parseInt(document.getElementById('revives-input').value) || 0;
        const genomeMultiplier = parseFloat(document.getElementById('genome-input').value) || 1.0;

        let basePrice = marketData[dinoKey] || 10;
        
        document.getElementById('base-price-hint').innerText = `Базовая цена вида: ${basePrice} DC`;

        // 1. Динамический бонус за ОА на основе ценности вида
        let oaRate = basePrice > 40 ? 0.015 : (basePrice > 15 ? 0.01 : 0.005);
        let oaBonus = oa * oaRate;
        let currentPrice = basePrice + oaBonus;

        // 2. Начисление бонуса за Воскрешения (+5% за каждое)
        let reviveMultiplier = 1 + (revives * 0.05);
        currentPrice *= reviveMultiplier;

        // 3. Свободный множитель Генома
        currentPrice *= genomeMultiplier;

        // Вывод итогового результата
        document.getElementById('final-price').innerText = Math.round(currentPrice);
    }

    window.onload = calculatePrice;
</script>

</body>
</html>
